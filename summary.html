<script src="https://cdn.tailwindcss.com"></script>

<div id="summary" class="hidden"></div>

<div class="flex justify-center gap-4 mt-6">

    <button onclick="goHome()" class="px-8 py-3 bg-gradient-to-r from-blue-300 via-pink-300 to-orange-300 
text-white font-semibold rounded-full shadow-lg 
hover:scale-105 hover:shadow-xl transition duration-300">

        Restart Assessment

    </button>

    <button onclick="openReview()" class="px-8 py-3 bg-gradient-to-r from-green-300 via-blue-300 to-purple-300 
text-white font-semibold rounded-full shadow-lg 
hover:scale-105 hover:shadow-xl transition duration-300">

        Review Answers

    </button>

</div>
<div id="reviewModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">

    <div class="bg-white w-11/12 md:w-2/3 max-h-[80vh] overflow-y-auto rounded-lg p-6 shadow-lg">

        <div class="flex justify-between items-center mb-4">

            <h2 class="text-xl font-bold">Answer Review</h2>

            <button onclick="closeReview()" class="text-red-500 font-bold text-xl">
                ✕
            </button>

        </div>

        <div id="reviewContent"></div>

    </div>

</div>
<div id="review" class="mt-10 max-w-3xl mx-auto hidden"></div>

<script>

    let answers = JSON.parse(localStorage.getItem("answers")) || {}

    fetch("https://skolarli-server.onrender.com/api/questions")
        .then(res => res.json())
        .then(data => {

            document.getElementById("summary").classList.remove("hidden")

            let total = data.length
            let answered = Object.keys(answers).length
            let unanswered = total - answered

            let correct = 0
            let wrong = 0

            data.forEach(q => {

                if (answers[q._id] !== undefined) {

                    if (parseInt(answers[q._id]) === q.correct) {
                        correct++
                    } else {
                        wrong++
                    }

                }

            })

            document.getElementById("summary").innerHTML = `

<div class="text-center mb-6">

<h2 class="text-3xl font-bold mb-6">Assessment Summary</h2>

<div class="grid grid-cols-2 gap-4 text-center p-10">

<div class="bg-blue-100 p-4 rounded-lg">
<p class="text-gray-600">Total Questions</p>
<p class="text-2xl font-bold text-blue-500">${total}</p>
</div>

<div class="bg-purple-100 p-4 rounded-lg">
<p class="text-gray-600">Answered</p>
<p class="text-2xl font-bold text-purple-500">${answered}</p>
</div>

<div class="bg-yellow-100 p-4 rounded-lg">
<p class="text-gray-600">Unanswered</p>
<p class="text-2xl font-bold text-yellow-500">${unanswered}</p>
</div>

<div class="bg-green-100 p-4 rounded-lg">
<p class="text-gray-600">Correct</p>
<p class="text-2xl font-bold text-green-600">${correct}</p>
</div>

<div class="bg-red-100 p-4 rounded-lg col-span-2">
<p class="text-gray-600">Wrong Answers</p>
<p class="text-2xl font-bold text-red-600">${wrong}</p>
</div>

</div>

</div>
`


            let reviewHTML = `<h2 class="text-2xl font-bold mb-6 text-center"></h2>`

            data.forEach((q, index) => {

                let userAnswerIndex = answers[q._id]

                let userAnswer = userAnswerIndex !== undefined
                    ? q.options[userAnswerIndex]
                    : "Not Answered"

                let correctAnswer = q.options[q.correct]

                reviewHTML += `

<div class="bg-white p-4 mb-4 rounded-lg shadow">

<p class="font-semibold mb-2">
Q${index + 1}. ${q.question}
</p>

<p>
Your Answer: 
<span class="${userAnswerIndex == q.correct ? 'text-green-600 font-semibold' : 'text-red-600 font-semibold'}">
${userAnswer}
</span>
</p>

<p class="text-blue-600">
Correct Answer: ${correctAnswer}
</p>

</div>

`

            })



            document.getElementById("reviewContent").innerHTML = reviewHTML

        })

    function goHome() {

        localStorage.removeItem("answers")
        window.location.href = "index.html"

    }

    function openReview() {

        document.getElementById("reviewModal").classList.remove("hidden")
        document.getElementById("reviewModal").classList.add("flex")

    }

    function closeReview() {

        document.getElementById("reviewModal").classList.add("hidden")
        document.getElementById("reviewModal").classList.remove("flex")

    }

</script>
